<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Christian Dassy profile banner</title>
  <desc id="desc">Terminal session on a router showing a colorized BGP summary, next to the name Christian Dassy, network architect focused on routing, WAN, BGP, and automation.</desc>
  <style>
    .t { font-family: "SF Mono", SFMono-Regular, ui-monospace, Menlo, Consolas, "Liberation Mono", monospace; }
    .cursor { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .cursor { animation: none; } }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B111E"/>
      <stop offset="100%" stop-color="#090E18"/>
    </linearGradient>
    <clipPath id="frame">
      <rect width="1200" height="360" rx="20"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="360" fill="url(#bg)"/>

    <!-- terminal title bar -->
    <rect width="1200" height="48" fill="#101826"/>
    <line x1="0" y1="48.5" x2="1200" y2="48.5" stroke="#1D2A3F" stroke-width="1"/>
    <circle cx="30" cy="24" r="6.5" fill="#FF5F57"/>
    <circle cx="52" cy="24" r="6.5" fill="#FEBC2E"/>
    <circle cx="74" cy="24" r="6.5" fill="#28C840"/>
    <text class="t" x="600" y="29" text-anchor="middle" font-size="14" fill="#5B6B84">christian@edge-rtr01 — ssh</text>
    <text class="t" x="1168" y="29" text-anchor="end" font-size="13" letter-spacing="1" fill="#53D8E8" opacity="0.85">BGP everywhere</text>

    <!-- CLI: colorized bgp summary -->
    <g class="t" font-size="19">
      <text x="36" y="94"><tspan fill="#8FA3BF">christian@edge-rtr01&gt;</tspan><tspan fill="#53D8E8" xml:space="preserve"> show bgp summary</tspan></text>
      <text x="36" y="132" fill="#5B6B84" xml:space="preserve">Peer           AS     Up/Down     State|PfxRcd</text>
      <text x="36" y="168" xml:space="preserve"><tspan fill="#53D8E8">10.64.0.1</tspan><tspan fill="#DCE7F5">      64496  312d 04:12  </tspan><tspan fill="#3DDC97">Estab</tspan><tspan fill="#5B6B84">|</tspan><tspan fill="#FFB454">1052k</tspan></text>
      <text x="36" y="204" xml:space="preserve"><tspan fill="#53D8E8">10.64.0.5</tspan><tspan fill="#DCE7F5">      64497  198d 22:47  </tspan><tspan fill="#3DDC97">Estab</tspan><tspan fill="#5B6B84">|</tspan><tspan fill="#FFB454">1052k</tspan></text>
      <text x="36" y="240" xml:space="preserve"><tspan fill="#53D8E8">2001:db8::2</tspan><tspan fill="#DCE7F5">    64511   84d 09:31  </tspan><tspan fill="#3DDC97">Estab</tspan><tspan fill="#5B6B84">|</tspan><tspan fill="#FFB454"> 214k</tspan></text>
      <text x="36" y="300" fill="#8FA3BF">christian@edge-rtr01&gt;</text>
      <rect class="cursor" x="292" y="283" width="11" height="22" fill="#FFB454"/>
    </g>

    <!-- divider -->
    <line x1="656" y1="76" x2="656" y2="316" stroke="#1D2A3F" stroke-width="1"/>

    <!-- identity -->
    <g class="t">
      <text x="700" y="104" font-size="13" letter-spacing="4" fill="#5B6B84">NETWORK ARCHITECT</text>
      <text x="700" y="152" font-size="42" font-weight="700" fill="#F2F7FF" letter-spacing="-1">Christian Dassy</text>
      <rect x="702" y="170" width="120" height="3" rx="1.5" fill="#FFB454"/>
      <text x="700" y="212" font-size="20" fill="#8FA3BF">routing · WAN · BGP · automation</text>

      <!-- signature: a route entry for himself -->
      <rect x="700" y="240" width="446" height="76" rx="10" fill="#0E1524" stroke="#1D2A3F"/>
      <text x="722" y="272" font-size="17" xml:space="preserve"><tspan fill="#3DDC97">*&gt;</tspan><tspan fill="#DCE7F5"> christiandassy.com</tspan></text>
      <text x="722" y="300" font-size="17" xml:space="preserve"><tspan fill="#DCE7F5">   via github.com/inxbit  </tspan><tspan fill="#FFB454">[best]</tspan></text>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="359" rx="19.5" fill="none" stroke="#1D2A3F"/>
</svg>
