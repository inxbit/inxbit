<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Christian Dassy profile banner</title>
  <desc id="desc">Network automation profile banner with routing, BGP, terminal tooling, and operational clarity themes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="42%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>

  <g opacity="0.12">
    <circle cx="1110" cy="42" r="170" fill="#22d3ee"/>
    <circle cx="1108" cy="326" r="150" fill="#34d399"/>
    <circle cx="846" cy="22" r="118" fill="#7c3aed"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M792 224C866 128 976 126 1074 198" stroke="#22d3ee" stroke-opacity="0.36" stroke-width="3"/>
    <path d="M846 262C914 304 1006 290 1096 230" stroke="#34d399" stroke-opacity="0.38" stroke-width="3"/>
    <path d="M810 170C884 96 1006 86 1120 126" stroke="#a78bfa" stroke-opacity="0.34" stroke-width="3"/>
    <path d="M920 170L982 224L1074 198" stroke="#e2e8f0" stroke-opacity="0.2" stroke-width="2"/>
    <path d="M920 170L846 262L982 224L1096 230L1074 198L1120 126" stroke="#e2e8f0" stroke-opacity="0.16" stroke-width="2"/>
  </g>

  <g filter="url(#glow)" opacity="0.8">
    <circle cx="810" cy="170" r="7" fill="#22d3ee"/>
    <circle cx="920" cy="170" r="7" fill="#a78bfa"/>
    <circle cx="982" cy="224" r="7" fill="#34d399"/>
    <circle cx="1074" cy="198" r="7" fill="#22d3ee"/>
    <circle cx="1120" cy="126" r="7" fill="#a78bfa"/>
    <circle cx="846" cy="262" r="7" fill="#34d399"/>
    <circle cx="1096" cy="230" r="7" fill="#34d399"/>
  </g>

  <g font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="18" fill="#94a3b8" opacity="0.42">
    <text x="1038" y="102">policy</text>
    <text x="838" y="304">telemetry</text>
    <text x="1048" y="276">ops</text>
  </g>

  <g transform="translate(64 66)">
    <rect x="0" y="0" width="468" height="228" rx="18" fill="#020617" fill-opacity="0.72" stroke="#334155"/>
    <rect x="0" y="0" width="468" height="42" rx="18" fill="#111827" fill-opacity="0.9"/>
    <circle cx="28" cy="21" r="6" fill="#ef4444"/>
    <circle cx="50" cy="21" r="6" fill="#f59e0b"/>
    <circle cx="72" cy="21" r="6" fill="#22c55e"/>
    <text x="24" y="84" fill="#22d3ee" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="24">$ show bgp summary</text>
    <text x="24" y="124" fill="#e2e8f0" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="22">routes: clear</text>
    <text x="24" y="160" fill="#e2e8f0" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="22">policy: visible</text>
    <text x="24" y="196" fill="#e2e8f0" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="22">tools: operator-first</text>
  </g>

  <g transform="translate(64 312)">
    <rect width="180" height="26" rx="13" fill="#22d3ee" fill-opacity="0.14" stroke="#22d3ee" stroke-opacity="0.45"/>
    <text x="18" y="18" fill="#cffafe" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="14">BGP everywhere</text>
  </g>

  <text x="548" y="94" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="46" font-weight="700">Christian Dassy</text>
  <text x="548" y="138" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">Networking, automation, and terminal tools</text>
  <rect x="548" y="166" width="342" height="4" rx="2" fill="url(#accent)"/>
  <text x="548" y="220" fill="#e2e8f0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="600">Routing clarity. Operational polish.</text>
  <text x="548" y="258" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21">Practical systems for people who live in terminals.</text>
</svg>
